};

const worked = new Set();

function buildSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  const groups = {};
  SECTIONS.forEach(s => { (groups[s.g] = groups[s.g] || []).push(s); });
  for (const g of Object.keys(GROUP_NAMES)) {
    const secs = groups[g];
    if (!secs) continue;
    const div = document.createElement('div');
    div.className = 'sb-group';
    const h = document.createElement('div');
    h.className = 'sb-head';
    h.textContent = GROUP_NAMES[g];
    div.appendChild(h);
    secs.sort((a,b) => a.a.localeCompare(b.a)).forEach(s => {
      const li = document.createElement('div');
      li.className = 'sb-item' + (worked.has(s.a) ? ' worked' : '');
      li.id = 'sb-' + s.a;
      li.innerHTML = '<div class="sb-dot"></div><span class="sb-abbr">' + s.a + '</span><span class="sb-name">' + s.n + '</span>';
      //li.addEventListener('click', () => FieldDayMap.toggle(s.a));
      div.appendChild(li);
    });
    sb.appendChild(div);
  }
}

function refresh(abbr) {
  const on = worked.has(abbr);
  const path = document.getElementById('sec-' + abbr);
  const lbl  = document.getElementById('lbl-' + abbr);
  const sbli = document.getElementById('sb-' + abbr);
  if (path) path.classList.toggle('worked', on);
  if (lbl)  lbl.classList.toggle('worked', on);
  if (sbli) sbli.classList.toggle('worked', on);
}

function refreshAll() {
  SECTIONS.forEach(s => refresh(s.a));
}

// ═════════════════════════════════════════════════════════════
//  PUBLIC API — window.FieldDayMap
// ═════════════════════════════════════════════════════════════
window.FieldDayMap = {
  /** Mark a section as worked. */
  work(abbr) {
    abbr = String(abbr).toUpperCase();
    const known = SECTIONS.some(s => s.a === abbr);
    if (!known) return false;
    worked.add(abbr);
    refresh(abbr);
    return true;
  },

  /** Un-mark a section. */
  unwork(abbr) {
    abbr = String(abbr).toUpperCase();
    worked.delete(abbr);
    refresh(abbr);
  },

  /** Toggle a section's worked state. */
  toggle(abbr) {
    abbr = String(abbr).toUpperCase();
    worked.has(abbr) ? this.unwork(abbr) : this.work(abbr);
  },

  /** Bulk-set worked sections from an array. Clears current state first. */
  setWorked(abbrs) {
    worked.clear();
    (abbrs || []).forEach(a => {
      const u = String(a).toUpperCase();
      if (SECTIONS.some(s => s.a === u)) worked.add(u);
    });
    refreshAll();
  },

  /** Get current worked sections as an array. */
  getWorked() { return [...worked]; },

  /** Clear all worked sections. */
  reset() { this.setWorked([]); },

  /**
   * Fetch worked sections from a JSON endpoint.
   * Expected response: { "worked": ["OH", "QC", ...] }
   */
async loadFromAPI(url) {
  try {
    const r = await fetch(url);
    const d = await r.json();
    if (Array.isArray(d)) this.setWorked(d);
    else console.warn('FieldDayMap.loadFromAPI: expected an array');
  } catch(e) { console.error('FieldDayMap.loadFromAPI error:', e); }
},
  /**
   * Poll an API endpoint on an interval.
   * Returns the interval ID (pass to clearInterval to stop).
   */
  startPolling(url, intervalMs = 30000) {
    this.loadFromAPI(url);
    return setInterval(() => this.loadFromAPI(url), intervalMs);
  },

  /** All valid section abbreviations. */
  getSections() { return SECTIONS.map(s => s.a); },

  /** Info about one section. */
  getSectionInfo(abbr) {
    return SECTIONS.find(s => s.a === String(abbr).toUpperCase()) || null;
  },
};
